version: '3.8'
services:
  api:
    build: .
    command: uvicorn api_app:app --host 0.0.0.0 --port 8000
    ports:
      - '8000:8000'
    volumes:
      - ./:/app

  mlflow:
    image: mlfloworg/mlflow:latest
    environment:
      - MLFLOW_TRACKING_URI=http://0.0.0.0:5000
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - MLFLOW_ARTIFACT_ROOT=s3://mlflow-artifacts/
    ports:
      - '5000:5000'
    command: mlflow server --backend-store-uri sqlite:///mlflow.db --default-artifact-root s3://mlflow-artifacts/ --host 0.0.0.0 --port 5000
    depends_on:
      - minio

  minio:
    image: quay.io/minio/minio:latest
    command: server /data --console-address ':9001'
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - ./minio_data:/data

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - '9090:9090'
    depends_on:
      - api

  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - '3000:3000'
    depends_on:
      - prometheus

# Note: For production use, replace MinIO with AWS S3 and set AWS credentials as env vars.
